name: Build & Push Plex Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/build.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/build.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: plex-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: rake-pro/plex-media-server

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Plex version from Dockerfile
        id: ver
        run: |
          version="$(sed -n 's/^ARG VERSION="\(1\.[0-9].*\)".*/\1/p' Dockerfile | head -n1)"
          if [ -z "$version" ]; then echo "::error::Could not parse VERSION from Dockerfile"; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved Plex version: $version"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Plex version from Dockerfile
        id: ver
        run: |
          version="$(sed -n 's/^ARG VERSION="\(1\.[0-9].*\)".*/\1/p' Dockerfile | head -n1)"
          if [ -z "$version" ]; then echo "::error::Could not parse VERSION from Dockerfile"; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
